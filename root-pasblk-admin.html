<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Inquiries Dashboard | Pasindu Bandarigoda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/admin.css">
</head>

<body>
    <div class="admin-shell">
        <section class="admin-login" id="admin-login">
            <div class="admin-login-card">
                <p class="admin-kicker">Private dashboard</p>
                <h1>Consultation inquiries</h1>
                <p class="admin-copy">Sign in with your email to view messages from your website contact form.</p>
                <form id="login-form" class="admin-form">
                    <label for="login-email">Your email</label>
                    <input type="email" id="login-email" name="email" required autocomplete="email" placeholder="bgpsandaruwan@gmail.com">
                    <button type="submit" class="admin-button" id="login-submit">Send sign-in link</button>
                </form>
                <p class="admin-status" id="login-status" role="status" aria-live="polite"></p>
                <a class="admin-back-link" href="index.html">← Back to website</a>
            </div>
        </section>

        <section class="admin-dashboard" id="admin-dashboard" hidden>
            <header class="admin-header">
                <div>
                    <p class="admin-kicker">Inquiries dashboard</p>
                    <h1>Website leads</h1>
                </div>
                <div class="admin-header-actions">
                    <button type="button" class="admin-button admin-button-secondary" id="refresh-leads">Refresh</button>
                    <button type="button" class="admin-button admin-button-ghost" id="sign-out">Sign out</button>
                </div>
            </header>

            <div class="admin-stats" id="admin-stats" aria-live="polite"></div>

            <div class="admin-leads" id="admin-leads"></div>

            <p class="admin-empty" id="admin-empty" hidden>No inquiries yet.</p>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/admin.js"></script>
</body>

</html>
